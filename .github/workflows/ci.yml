name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      mem0_api_base:
        description: "MEM0_API_BASE for live integration tests"
        required: false
      mem0_api_key:
        description: "MEM0_API_KEY for live integration tests"
        required: false

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: ruff check memcp/ tests/
      - run: ruff format --check memcp/ tests/
      - run: pyright memcp/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: pytest -x
        env:
          MEM0_API_BASE: ${{ inputs.mem0_api_base || secrets.MEM0_API_BASE }}
          MEM0_API_KEY: ${{ inputs.mem0_api_key || secrets.MEM0_API_KEY }}

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - run: docker build -t memcp:ci .

      - name: Verify container starts and health endpoint responds
        run: |
          docker run -d --name memcp-ci \
            -e MEM0_API_BASE=http://localhost:9999 \
            -e MEM0_API_KEY=fake \
            -p 8080:8080 \
            memcp:ci
          STATUS=""
          for i in $(seq 1 15); do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/health 2>/dev/null || true)
            if [ "$STATUS" = "503" ] || [ "$STATUS" = "200" ]; then break; fi
            sleep 1
          done
          docker logs memcp-ci
          docker rm -f memcp-ci
          if [ "$STATUS" = "503" ] || [ "$STATUS" = "200" ]; then
            echo "Health endpoint responding: $STATUS"
          else
            echo "Health endpoint failed: $STATUS"
            exit 1
          fi

  check:
    if: always()
    needs: [lint, test, build]
    runs-on: ubuntu-latest
    steps:
      - run: |
          results=("${{ needs.lint.result }}" "${{ needs.test.result }}" "${{ needs.build.result }}")
          for r in "${results[@]}"; do
            if [[ "$r" != "success" && "$r" != "skipped" ]]; then
              echo "Check failed: $r"
              exit 1
            fi
          done
